<!DOCTYPE html>
<html>
<head>
  <title>Auto Merge Export</title>
</head>
<body>

<h2>Auto Merge Firebase → files.json</h2>

<button onclick="goBack()">← Back</button>

<br><br>

<button onclick="mergeData()">Merge Data</button>
<button onclick="copyData()">Copy JSON</button>

<br><br>

<textarea id="output" rows="25" cols="90" placeholder="Merged JSON will appear here..."></textarea>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔒 protect page
auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  }
});

// 🔥 MAIN MERGE FUNCTION
async function mergeData() {

  try {

    // 🔹 1. LOAD LOCAL JSON
    const res = await fetch("files.json");
    const localFiles = await res.json();

    // 🔹 2. LOAD FIREBASE DATA
    const snapshot = await db.collection("files").get();

    const firebaseFiles = [];

    snapshot.forEach(doc => {
      const d = doc.data();

      firebaseFiles.push({
        id: d.customId,
        name: d.name,
        type: d.type,
        category: d.category,
        description: d.description || "",
        image: d.image || "",
        downloads: d.links || []
      });
    });

    // 🔹 3. MERGE BOTH
    const merged = [...localFiles, ...firebaseFiles];

    // 🔹 4. REMOVE DUPLICATES (by id)
    const uniqueMap = {};

    merged.forEach(item => {
      uniqueMap[item.id] = item;
    });

    const finalData = Object.values(uniqueMap);

    // 🔹 5. SORT (latest first)
    finalData.sort((a, b) => b.id - a.id);

    // 🔹 6. OUTPUT CLEAN JSON
    document.getElementById("output").value =
      JSON.stringify(finalData, null, 2);

  } catch (err) {
    console.error(err);
    alert("Error merging data");
  }
}

// 📋 COPY
function copyData() {
  const textarea = document.getElementById("output");
  textarea.select();
  document.execCommand("copy");
  alert("Copied!");
}

// 🔙 BACK
function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
