<!DOCTYPE html>
<html>
<head>
  <title>Delete Files</title>
</head>
<body>

<h2>Delete File</h2>

<!-- 🔙 BACK -->
<button onclick="goBack()">← Back</button>

<hr>

<h3>All Files</h3>
<div id="fileList">Loading...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔒 PROTECT PAGE
auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Login first");
    window.location.href = "admin.html";
  } else {
    loadFiles();
  }
});

// 🔹 LOAD FILES
async function loadFiles() {
  const container = document.getElementById("fileList");
  container.innerHTML = "Loading...";

  const snapshot = await db.collection("files").get();

  container.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <strong>${data.name}</strong><br>
        ${data.type} • ${data.category}
        <br><br>
        <button onclick="deleteFile('${doc.id}', '${data.name}')">Delete</button>
      </div>
    `;
  });
}

// 🔹 DELETE FUNCTION
async function deleteFile(docId, name) {

  const confirmDelete = confirm(`Are you sure you want to delete "${name}"?`);

  if (!confirmDelete) return;

  try {
    await db.collection("files").doc(docId).delete();

    alert("File deleted successfully!");

    // 🔄 refresh list
    loadFiles();

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

// 🔙 BACK
function goBack() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
