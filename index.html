<!-- 🔥 FIREBASE VISITOR COUNTER -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnPwFPYYdWJ4FuBnvL0CpgzVxo9YyRMGg",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "stats", "visitors");

// ✅ Prevent double counting in same session
if (!sessionStorage.getItem("visited")) {
  sessionStorage.setItem("visited", "true");

  async function updateCounter() {
    try {
      const snap = await getDoc(ref);

      if (snap.exists()) {
        let count = snap.data().count || 0;
        count++;

        await updateDoc(ref, { count });

        document.getElementById("visitorCount").innerText =
          "👁 Visitors: " + count;
      } else {
        await setDoc(ref, { count: 1 });

        document.getElementById("visitorCount").innerText =
          "👁 Visitors: 1";
      }

    } catch (error) {
      console.error(error);
      document.getElementById("visitorCount").innerText =
        "👁 Visitors: error";
    }
  }

  updateCounter();

} else {
  // Just show count without increasing
  async function showCount() {
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        document.getElementById("visitorCount").innerText =
          "👁 Visitors: " + snap.data().count;
      }
    } catch {
      document.getElementById("visitorCount").innerText =
        "👁 Visitors: error";
    }
  }

  showCount();
}
</script>

</body>
