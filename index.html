<!-- 🔥 FIREBASE (DAILY UNIQUE VISITOR VERSION) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
window.addEventListener("DOMContentLoaded", function () {

  try {
    const today = new Date().toLocaleDateString();

    const firebaseConfig = {
      apiKey: "AIzaSyBnPwFPYYdWJ4FuBnvL0CpgzVxo9YyRMGg",
      authDomain: "filehub-counter.firebaseapp.com",
      projectId: "filehub-counter"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const ref = db.collection("stats").doc("visitors");

    const lastVisit = localStorage.getItem("lastVisitDate");

    // ✅ Count only once per day
    if (lastVisit !== today) {

      ref.set({
        count: firebase.firestore.FieldValue.increment(1)
      }, { merge: true })
      .then(() => {
        localStorage.setItem("lastVisitDate", today);
        return ref.get();
      })
      .then(doc => {
        document.getElementById("visitorCount").innerText =
          "👁 Visitors: " + doc.data().count;
      });

    } else {
      // 👁 Just show count
      ref.get().then(doc => {
        document.getElementById("visitorCount").innerText =
          "👁 Visitors: " + doc.data().count;
      });
    }

  } catch (e) {
    console.error("Error:", e);
    document.getElementById("visitorCount").innerText =
      "⚠️ Visitors unavailable";
  }

});
</script>

</body>
