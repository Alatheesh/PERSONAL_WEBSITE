<!-- 🔥 FIREBASE VISITOR COUNTER (FINAL STABLE VERSION) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnPwFPYYdWJ4FuBnvL0CpgzVxo9YyRMGg",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "stats", "visitors");

async function updateCounter() {
  try {
    // 🔥 Safe atomic increment
    await setDoc(ref, { count: increment(1) }, { merge: true });

    // 🔥 Read updated value
    const snap = await getDoc(ref);

    if (snap.exists()) {
      document.getElementById("visitorCount").innerText =
        "👁 Visitors: " + snap.data().count;
    } else {
      document.getElementById("visitorCount").innerText =
        "👁 Visitors: 1";
    }

  } catch (error) {
    console.error("Firebase error:", error);
    document.getElementById("visitorCount").innerText =
      "👁 Visitors: error";
  }
}

updateCounter();
</script>
