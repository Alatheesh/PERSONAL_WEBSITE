<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- 🔥 VISITOR BOX -->
<div id="visitorBox">
  <span id="visitorCount">Visitors: 0</span>
</div>

<!-- PROFILE IMAGE -->
<a href="https://t.me/llathu63035" target="_blank" class="profile-link">
  <img src="https://raw.githubusercontent.com/Alatheesh/PERSONAL_WEBSITE/main/images/telegram_image.jpg" alt="Profile">
</a>

<!-- 🔥 PREMIUM HERO -->
<div class="hero glass-card">

  <h1 id="typingText"></h1>

  <p class="subtitle">Store and access your files easily</p>

  <button onclick="goToApp()" class="premium-btn">
    Get Started →
  </button>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Developed by Latheesh Reddy | For educational purposes only
</div>

<script>
function goToApp() {
  window.location.href = "search.html"; 
}
</script>

<!-- ⌨️ TYPING EFFECT -->
<script>
const text = "📁 File Hub";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}

window.addEventListener("load", typeEffect);
</script>

<!-- 🔥 FIREBASE (DAILY UNIQUE VISITOR) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
window.addEventListener("DOMContentLoaded", function () {

  try {
    const today = new Date().toLocaleDateString();

    const firebaseConfig = {
      apiKey: "AIzaSyBnPwFPYYdWJ4FuBnvL0CpgzVxo9YyRMGg",
      authDomain: "filehub-counter.firebaseapp.com",
      projectId: "filehub-counter"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const ref = db.collection("stats").doc("visitors");

    const lastVisit = localStorage.getItem("lastVisitDate");

    if (lastVisit !== today) {
      ref.set({
        count: firebase.firestore.FieldValue.increment(1)
      }, { merge: true })
      .then(() => {
        localStorage.setItem("lastVisitDate", today);
        return ref.get();
      })
      .then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    } else {
      ref.get().then(doc => {
        document.getElementById("visitorCount").innerText =
          "Visitors: " + doc.data().count;
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById("visitorCount").innerText =
      "Visitors unavailable";
  }

});
</script>

</body>
</html>
