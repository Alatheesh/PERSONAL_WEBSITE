<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <input type="email" id="username" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 📋 MENU -->
<div id="menuBox" style="display:none; text-align:center;">

  <h3>Select Action</h3>

  <button onclick="goTo('add.html')">Add File</button><br><br>
  <button onclick="goTo('edit.html')">Edit File</button><br><br>
  <button onclick="goTo('delete.html')">Delete File</button><br><br>
  <button onclick="goTo('export.html')">Export Data</button><br><br>

  <!-- 🔥 NEW BUTTON -->
  <button onclick="showReports()">Reports</button><br><br>

  <button onclick="logout()">Logout</button>

</div>

<!-- 📊 REPORT SECTION -->
<div id="reportBox" style="display:none; text-align:center;">

  <h3>Reports</h3>

  <button onclick="toggleReports()">🔘 Toggle ON/OFF</button><br><br>

  <div id="reportsList">Loading...</div>

  <br>
  <button onclick="goBackMenu()">← Back</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// LOGIN
function login() {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      alert("Login successful");
      showMenu();
    })
    .catch(err => alert(err.message));
}

// LOGOUT
function logout() {
  auth.signOut();
}

// SHOW MENU
function showMenu() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("menuBox").style.display = "block";
  document.getElementById("reportBox").style.display = "none";
}

// AUTH LISTENER
auth.onAuthStateChanged(user => {
  if (user) {
    showMenu();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("menuBox").style.display = "none";
    document.getElementById("reportBox").style.display = "none";
  }
});

// NAVIGATION
function goTo(page) {
  window.location.href = page;
}

//////////////////////////////////////////////////////
// 🔥 REPORT SYSTEM
//////////////////////////////////////////////////////

// SHOW REPORT PAGE
function showReports() {
  document.getElementById("menuBox").style.display = "none";
  document.getElementById("reportBox").style.display = "block";
  loadReports();
}

// BACK TO MENU
function goBackMenu() {
  document.getElementById("reportBox").style.display = "none";
  document.getElementById("menuBox").style.display = "block";
}

// LOAD REPORTS
async function loadReports() {
  const container = document.getElementById("reportsList");
  container.innerHTML = "Loading...";

  const snapshot = await db.collection("reports").orderBy("time","desc").get();

  container.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <strong>File ID:</strong> ${d.fileId}<br>
        <strong>Message:</strong> ${d.message}<br>

        <button onclick="deleteReport('${doc.id}')">🗑 Delete</button>
      </div>
    `;
  });

  if (container.innerHTML === "") {
    container.innerHTML = "No reports";
  }
}

// DELETE REPORT
async function deleteReport(id) {
  if (!confirm("Delete this report?")) return;

  await db.collection("reports").doc(id).delete();

  loadReports();
}

// TOGGLE REPORT ON/OFF
async function toggleReports() {
  const ref = db.collection("settings").doc("config");

  const doc = await ref.get();

  let current = true;

  if (doc.exists) {
    current = doc.data().reportEnabled !== false;
  }

  await ref.set({
    reportEnabled: !current
  });

  alert("Reports are now " + (!current ? "ENABLED" : "DISABLED"));
}

</script>

</body>
</html>
