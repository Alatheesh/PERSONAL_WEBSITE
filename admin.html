<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <input type="email" id="username" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 📋 MENU -->
<div id="menuBox" style="display:none; text-align:center;">

  <h3>Select Action</h3>

  <button onclick="goTo('add.html')">Add File</button><br><br>
  <button onclick="goTo('edit.html')">Edit File</button><br><br>
  <button onclick="goTo('delete.html')">Delete File</button><br><br>
  <button onclick="goTo('export.html')">Export Data</button><br><br>

  <!-- ✅ REPORTS PAGE BUTTON -->
  <button onclick="goTo('reports.html')">Reports</button><br><br>

  <button onclick="logout()">Logout</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

// ✅ persistence
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// LOGIN
function login() {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      alert("Login successful");
      showMenu();
    })
    .catch(err => alert(err.message));
}

// LOGOUT
function logout() {
  auth.signOut();
}

// SHOW MENU
function showMenu() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("menuBox").style.display = "block";
}

// AUTH LISTENER
auth.onAuthStateChanged(user => {
  if (user) {
    showMenu();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("menuBox").style.display = "none";
  }
});

// NAVIGATION
function goTo(page) {
  window.location.href = page;
}
</script>

</body>
</html>
