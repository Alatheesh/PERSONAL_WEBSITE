<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<!-- 🔐 Login Section -->
<div id="loginBox">
  <input type="email" id="username" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 📂 Admin Section -->
<div id="adminBox" style="display:none;">

  <h3>Add New File</h3>

  <input type="text" id="name" placeholder="File Name"><br><br>
  <input type="text" id="type" placeholder="Type (PDF, Video)"><br><br>
  <input type="text" id="category" placeholder="Category"><br><br>

  <input type="text" id="image" placeholder="Image URL"><br><br>

  <!-- 🔥 MULTIPLE LINKS -->
  <textarea id="link" placeholder="Enter multiple links separated by comma"></textarea><br><br>

  <textarea id="description" placeholder="Description"></textarea><br><br>

  <button onclick="addFile()">Add File</button>
  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login() {
  const email = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => alert("Login successful"))
    .catch(err => alert(err.message));
}
// LOGOUT
function logout() {
  auth.signOut();
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {
  loginBox.style.display = user ? "none" : "block";
  adminBox.style.display = user ? "block" : "none";
});

// ADD FILE
async function addFile() {

  if (!auth.currentUser) {
    alert("Login first");
    return;
  }

  const name = name.value.trim();
  const type = type.value.trim();
  const category = category.value.trim();
  const image = image.value.trim();

  const linkInput = document.getElementById("link").value.trim();
  const links = linkInput.split(",").map(l => l.trim()).filter(l => l);

  const description = description.value.trim();

  if (!name || !type || !category) {
    alert("Fill required fields");
    return;
  }

  try {
    const res = await fetch("files.json");
    const localFiles = await res.json();

    const localMax = Math.max(...localFiles.map(f => f.id), 0);

    const snapshot = await db.collection("files").get();
    let firebaseMax = 0;

    snapshot.forEach(doc => {
      const data = doc.data();
      if (data.customId > firebaseMax) firebaseMax = data.customId;
    });

    const nextId = Math.max(localMax, firebaseMax) + 1;

    await db.collection("files").add({
      customId: nextId,
      name,
      type,
      category,
      image,
      links,
      description
    });

    alert("Added!");

  } catch (err) {
    alert(err.message);
  }
}
</script>

</body>
</html>
