<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<!-- 🔐 Login Section -->
<div id="loginBox">
  <input type="email" id="username" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- 📂 Admin Section -->
<div id="adminBox" style="display:none;">

  <h3>Add New File</h3>

  <input type="text" id="name" placeholder="File Name"><br><br>
  <input type="text" id="type" placeholder="Type (PDF, Video)"><br><br>
  <input type="text" id="category" placeholder="Category"><br><br>

  <button onclick="addFile()">Add File</button>
  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<!-- 🔥 Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 LOGIN (REAL AUTH)
function login() {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful");
    })
    .catch(err => {
      alert(err.message);
    });
}

// 🔓 LOGOUT
function logout() {
  auth.signOut();
}

// 🔁 AUTO LOGIN STATE
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminBox").style.display = "block";
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("adminBox").style.display = "none";
  }
});

// ➕ ADD FILE FUNCTION
async function addFile() {

  const user = auth.currentUser;

  if (!user) {
    alert("You must login first");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const type = document.getElementById("type").value.trim();
  const category = document.getElementById("category").value.trim();

  if (!name || !type || !category) {
    alert("Please fill all fields");
    return;
  }

  try {

    // 🔹 Load local JSON
    const res = await fetch("files.json");
    const localFiles = await res.json();

    const localMax = Math.max(...localFiles.map(f => f.id), 0);

    // 🔹 Load Firebase data
    const snapshot = await db.collection("files").get();

    let firebaseMax = 0;
    snapshot.forEach(doc => {
      const data = doc.data();
      if (data.customId && data.customId > firebaseMax) {
        firebaseMax = data.customId;
      }
    });

    // 🔥 Next ID
    const nextId = Math.max(localMax, firebaseMax) + 1;

    // 🔥 Save to Firebase
    await db.collection("files").add({
      customId: nextId,
      name: name,
      type: type,
      category: category
    });

    alert("File added successfully! ID: " + nextId);

    // 🔄 Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("category").value = "";

  } catch (err) {
    console.error("FULL ERROR:", err);
    alert(err.message);
  }
}

</script>

</body>
</html>
