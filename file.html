<!DOCTYPE html>
<html>
<head>
  <title>File Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    /* 🔥 LAYOUT */
    .page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin-top: 60px;
    }

    .side-ad {
      width: 160px;
      margin: 20px;
    }

    .center {
      max-width: 400px;
    }

    /* ❌ HIDE SIDE ADS ON MOBILE */
    @media (max-width: 900px) {
      .side-ad {
        display: none;
      }
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      margin: 6px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }

    .back {
      background: #555;
      margin: 20px auto;
      display: block;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    /* 🔥 MOBILE AD (ONLY BELOW BACK BUTTON) */
    .mobile-ad {
      display: none;
      text-align: center;
      margin: 20px;
    }

    @media (max-width: 900px) {
      .mobile-ad {
        display: block;
      }
    }

    #reportBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #ff4444;
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>

<button id="reportBtn" onclick="reportIssue()">⚠ Report Issue</button>

<div class="page">

  <!-- LEFT AD -->
  <div class="side-ad" id="leftAd"></div>

  <!-- CENTER -->
  <div class="center">
    <div class="card" id="fileCard">Loading...</div>
  </div>

  <!-- RIGHT AD -->
  <div class="side-ad" id="rightAd"></div>

</div>

<button class="back" onclick="history.back()">← Back</button>

<!-- 🔥 MOBILE AD BELOW BACK BUTTON -->
<div class="mobile-ad" id="mobileAd"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFileId = null;

async function loadFile() {

  const id = Number(new URLSearchParams(location.search).get("id"));

  const res = await fetch("files.json");
  const localFiles = await res.json();

  const snapshot = await db.collection("files").get();

  const firebaseFiles = [];
  snapshot.forEach(doc => {
    const d = doc.data();
    firebaseFiles.push({
      id: Number(d.customId),
      name: d.name,
      type: d.type,
      category: d.category,
      image: d.image,
      description: d.description,
      links: d.links,
      link: d.link
    });
  });

  const file = [...localFiles, ...firebaseFiles].find(f => Number(f.id) === id);

  if (!file) {
    fileCard.innerHTML = "File not found";
    return;
  }

  currentFileId = file.id;

  let links = [];

  if (Array.isArray(file.links) && file.links.length > 0) {
    links = file.links;
  } 
  else if (Array.isArray(file.downloads) && file.downloads.length > 0) {
    links = file.downloads;
  } 
  else if (file.link && file.link.trim() !== "") {
    links = [file.link];
  }

  let downloadHTML = "";

  if (links.length > 0) {
    downloadHTML = `<div class="download-grid">`;

    links.forEach((l,i) => {
      let url = typeof l === "string" ? l : l.url;
      let label = typeof l === "string"
        ? `Download ${i+1}`
        : (l.size ? `⬇ ${l.size} ${l.unit}` : `Download ${i+1}`);

      downloadHTML += `
        <button onclick="window.open('${url}','_blank')">
          ${label}
        </button>
      `;
    });

    downloadHTML += `</div>`;
  } else {
    downloadHTML = `<p>No download link available</p>`;
  }

  fileCard.innerHTML = `
    <img src="${file.image || 'https://via.placeholder.com/300'}">
    <h2>${file.name}</h2>
    <p>${file.type} • ${file.category}</p>
    <p>${file.description || ''}</p>
    ${downloadHTML}
  `;

  // 🔥 AD FUNCTION
  function createAd(container) {
    const s1 = document.createElement("script");
    s1.innerHTML = `
      atOptions = {
        'key' : 'c371556f2f761e68ac3fdb0215382818',
        'format' : 'iframe',
        'height' : 250,
        'width' : 300,
        'params' : {}
      };
    `;

    const s2 = document.createElement("script");
    s2.src = "https://www.highperformanceformat.com/c371556f2f761e68ac3fdb0215382818/invoke.js";

    container.appendChild(s1);
    container.appendChild(s2);
  }

  // DESKTOP ADS
  createAd(document.getElementById("leftAd"));
  createAd(document.getElementById("rightAd"));

  // MOBILE AD
  createAd(document.getElementById("mobileAd"));
}

function reportIssue() {
  const msg = prompt("Describe the issue:");
  if (!msg) return;

  db.collection("reports").add({
    fileId: currentFileId,
    message: msg,
    time: new Date()
  });

  alert("Report submitted 👍");
}

loadFile();
</script>

</body>
</html>
