<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadFile() {

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id"));

  try {
    // 🔹 Load JSON
    const res = await fetch("files.json");
    const localFiles = await res.json();

    // 🔹 Load Firebase
    const snapshot = await db.collection("files").get();

    const firebaseFiles = [];
    snapshot.forEach(doc => {
      const data = doc.data();

      firebaseFiles.push({
        id: data.customId,
        name: data.name,
        type: data.type,
        category: data.category,
        link: data.link,
        description: data.description,
        image: data.image
      });
    });

    // 🔥 Merge both
    const allFiles = [...localFiles, ...firebaseFiles];

    // 🔍 Find file
    const file = allFiles.find(f => f.id === id);

    if (!file) {
      document.body.innerHTML = "<h1>File not found</h1>";
      return;
    }

    // 🎯 DISPLAY (simple version)
    document.body.innerHTML = `
      <h1>${file.name}</h1>
      <p>${file.type} • ${file.category}</p>
      <p>${file.description || ''}</p>
      <button onclick="window.open('${file.link}', '_blank')">Open File</button>
      <br><br>
      <button onclick="window.history.back()">← Back</button>
    `;

  } catch (err) {
    console.error(err);
    document.body.innerHTML = "<h1>Error loading file</h1>";
  }
}

loadFile();
</script>
