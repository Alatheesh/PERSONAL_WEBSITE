<!DOCTYPE html>
<html>
<head>
  <title>File Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin-top: 60px;
    }

    .side-ad {
      width: 160px;
      margin: 20px;
      text-align: center;
    }

    .center {
      max-width: 400px;
      width: 100%;
    }

    @media (max-width: 900px) {
      .side-ad {
        display: none;
      }
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      overflow-wrap: break-word;
      word-wrap: break-word;
      word-break: break-word;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      margin: 6px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }

    .back {
      background: #555;
      margin: 20px auto;
      display: block;
    }

    .download-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .download-grid button {
      flex: 1;
      min-width: 130px;
      margin: 0;
      box-sizing: border-box;
      padding: 10px 5px;
    }

    .mobile-ad {
      display: none;
      text-align: center;
      margin: 20px;
    }

    @media (max-width: 900px) {
      .mobile-ad {
        display: block;
      }
    }

    .bottom-banner {
      width: 100%;
      text-align: center;
      margin: 20px 0;
    }

    #reportBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #ff4444;
      padding: 10px;
      border-radius: 8px;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>

<button id="reportBtn" onclick="reportIssue()">⚠ Report</button>

<div class="page">

  <div class="side-ad">
    <script>
      atOptions = {
        'key' : '6d18eab8e3174f704484a4e5fb7166a4',
        'format' : 'iframe',
        'height' : 300,
        'width' : 160,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/6d18eab8e3174f704484a4e5fb7166a4/invoke.js"></script>
  </div>

  <div class="center">
    <div class="card" id="fileCard">Loading...</div>
  </div>

  <div class="side-ad">
    <script>
      atOptions = {
        'key' : '6d18eab8e3174f704484a4e5fb7166a4',
        'format' : 'iframe',
        'height' : 300,
        'width' : 160,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/6d18eab8e3174f704484a4e5fb7166a4/invoke.js"></script>
  </div>

</div>

<button class="back" onclick="history.back()">← Back</button>

<div class="mobile-ad">
  <script>
    atOptions = {
      'key' : '6d18eab8e3174f704484a4e5fb7166a4',
      'format' : 'iframe',
      'height' : 300,
      'width' : 160,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/6d18eab8e3174f704484a4e5fb7166a4/invoke.js"></script>
</div>

<div class="bottom-banner">
  <script>
    atOptions = {
      'key' : '9d4e234e334f6012b5b60f60507d7877',
      'format' : 'iframe',
      'height' : 90,
      'width' : 728,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/9d4e234e334f6012b5b60f60507d7877/invoke.js"></script>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFileId = null;

window.addEventListener("DOMContentLoaded", async function () {
  try {
    const doc = await db.collection("settings").doc("config").get();
    let enabled = true;

    if (doc.exists) {
      enabled = doc.data().reportEnabled !== false;
    }

    const btn = document.getElementById("reportBtn");
    btn.style.display = enabled ? "block" : "none";

  } catch (e) {
    console.error("Error loading report setting:", e);
  }
});

async function loadFile() {
  const id = Number(new URLSearchParams(location.search).get("id"));

  const res = await fetch("files.json");
  const localFiles = await res.json();

  const snapshot = await db.collection("files").get();

  const firebaseFiles = [];
  snapshot.forEach(doc => {
    const d = doc.data();
    firebaseFiles.push({
      id: Number(d.customId),
      name: d.name,
      type: d.type,
      category: d.category,
      image: d.image,
      description: d.description,
      links: d.links,
      link: d.link
    });
  });

  const file = [...localFiles, ...firebaseFiles].find(f => Number(f.id) === id);

  if (!file) {
    fileCard.innerHTML = "File not found";
    return;
  }

  currentFileId = file.id;

  let links = [];

  if (Array.isArray(file.links) && file.links.length > 0) {
    links = file.links;
  } 
  else if (Array.isArray(file.downloads) && file.downloads.length > 0) {
    links = file.downloads;
  } 
  else if (file.link && typeof file.link === "string" && file.link.trim() !== "") {
    links = [file.link];
  }

  let downloadHTML = "";

  if (links.length > 0) {
    downloadHTML = `<div class="download-grid">`;

    links.forEach((l,i) => {
      let url = typeof l === "string" ? l : l.url;
      let label = typeof l === "string"
        ? `Watch ${i+1}`
        : (l.size ? `🎥 Watch ${l.size} ${l.unit} 🍿` : `Watch ${i+1}`);

      downloadHTML += `
        <button onclick="openWatch('${url}')">
          ${label}
        </button>
      `;
    });

    downloadHTML += `</div>`;
  } else {
    downloadHTML = `<p style='opacity:0.7;'>No download link available</p>`;
  }

  fileCard.innerHTML = `
    <img src="${file.image || 'https://via.placeholder.com/300'}">
    <h2>${file.name}</h2>
    <p>${file.type} • ${file.category}</p>
    <p>${file.description || ''}</p>
    ${downloadHTML}
  `;
}

function openWatch(link){
  const encoded = encodeURIComponent(link);
  window.location.href =
    "https://workingpro.netlify.app/watch.html?link=" + encoded;
}

function reportIssue() {
  const msg = prompt("Describe the issue:");
  if (!msg || msg.trim() === "") return;

  if (!currentFileId) {
    alert("Error: File not loaded yet.");
    return;
  }

  db.collection("reports").add({
    fileId: currentFileId,
    message: msg.trim(),
    time: new Date()
  })
  .then(() => {
    alert("Report submitted successfully 👍");
  })
  .catch((error) => {
    console.error("Error adding report:", error);
    alert("Failed to submit report ❌");
  });
}

loadFile();
</script>

</body>
</html>
