<!DOCTYPE html>
<html>
<head>
  <title>File Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      margin-top: 60px;
    }

    .side-ad {
      width: 160px;
      margin: 20px;
      text-align: center;
    }

    .center {
      max-width: 400px;
    }

    @media (max-width: 900px) {
      .side-ad {
        display: none;
      }
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      margin: 6px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
    }

    .back {
      background: #555;
      margin: 20px auto;
      display: block;
    }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .mobile-ad {
      display: none;
      text-align: center;
      margin: 20px;
    }

    @media (max-width: 900px) {
      .mobile-ad {
        display: block;
      }
    }

    .bottom-banner {
      width: 100%;
      text-align: center;
      margin: 20px 0;
    }

    #reportBtn {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #ff4444;
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 1000;
      display: none;
    }
  </style>
</head>
<body>

<button id="reportBtn" onclick="reportIssue()">⚠ Report Issue</button>

<div class="page">

  <!-- ✅ LEFT AD -->
  <div class="side-ad">
    <script>

</div>

<!-- 🔥 YOUR ORIGINAL FIREBASE + LOGIC (UNCHANGED) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA8rEqkC8m8bmDi9UhnJuGuTqaWXY5CuKM",
  authDomain: "filehub-counter.firebaseapp.com",
  projectId: "filehub-counter"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFileId = null;

// 🔥 YOUR ORIGINAL loadFile FUNCTION (unchanged)
async function loadFile() {
  const id = Number(new URLSearchParams(location.search).get("id"));

  const res = await fetch("files.json");
  const localFiles = await res.json();

  const snapshot = await db.collection("files").get();

  const firebaseFiles = [];
  snapshot.forEach(doc => {
    const d = doc.data();
    firebaseFiles.push({
      id: Number(d.customId),
      name: d.name,
      type: d.type,
      category: d.category,
      image: d.image,
      description: d.description,
      links: d.links,
      link: d.link
    });
  });

  const file = [...localFiles, ...firebaseFiles].find(f => Number(f.id) === id);

  if (!file) {
    fileCard.innerHTML = "File not found";
    return;
  }

  currentFileId = file.id;

  fileCard.innerHTML = `
    <img src="${file.image || 'https://via.placeholder.com/300'}">
    <h2>${file.name}</h2>
    <p>${file.type} • ${file.category}</p>
    <p>${file.description || ''}</p>
  `;
}

function reportIssue() {
  const msg = prompt("Describe the issue:");
  if (!msg) return;

  db.collection("reports").add({
    fileId: currentFileId,
    message: msg,
    time: new Date()
  });

  alert("Report submitted 👍");
}

loadFile();
</script>

</body>
</html>
